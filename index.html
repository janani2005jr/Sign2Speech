<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign to Speech AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🤟 Sign to Speech Converter</h1>

    <p class="subtitle">
        AI Powered Real-Time Communication Assistant
    </p>

    <div class="button-group">

        <button class="start-btn" onclick="startCamera()">
            🟢 Start Camera
        </button>

        <button class="stop-btn" onclick="stopCamera()">
            🔴 Stop Camera
        </button>

    </div>

    <div class="camera-card">

        <img
            id="cameraFeed"
            src=""
            style="display:none;width:100%;"
        >

        <div id="placeholder">

            <h2>📷 Camera is OFF</h2>

            <p>Click Start Camera to begin.</p>

        </div>

    </div>

    <div class="info">

        <div class="box">
            <h3>🤖 AI Model</h3>
            <p>MediaPipe Hand Tracking</p>
        </div>

        <div class="box">
            <h3>🔊 Speech</h3>
            <p>Real-Time Voice Output</p>
        </div>

        <div class="box">
            <h3>⚡ Status</h3>

            <p id="status">

                Camera Stopped

            </p>

        </div>

    </div>

    <footer>

        Made with ❤️ using Flask • OpenCV • MediaPipe • Python

    </footer>

</div>

<script>

function startCamera(){

    document.getElementById("cameraFeed").src="/video";

    document.getElementById("cameraFeed").style.display="block";

    document.getElementById("placeholder").style.display="none";

    document.getElementById("status").innerHTML="🟢 Camera Running";

}

function stopCamera(){

    document.getElementById("cameraFeed").src="";

    document.getElementById("cameraFeed").style.display="none";

    document.getElementById("placeholder").style.display="block";

    document.getElementById("status").innerHTML="🔴 Camera Stopped";

}

</script>

</body>

</html>
